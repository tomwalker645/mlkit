<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ניהול מחלקה - Mobile Samsung</title>
    <style>
        :root { 
            --primary: #007bff; /* כחול סמסונג קלאסי */
            --success: #28a745; 
            --danger: #dc3545; 
            --dark: #000000;
            --gray: #f8f9fa;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #e9ecef; 
            margin: 0; 
            padding: 0; 
            user-select: none; /* מניעת בחירת טקסט בטעות בזמן לחיצה על כפתורים */
            touch-action: manipulation;
        }

        /* מסך נעילה בסטייל טלפון */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); color: white; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .pin-display { font-size: 2em; letter-spacing: 10px; margin-bottom: 30px; height: 40px; }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .pin-btn { 
            width: 70px; height: 70px; border-radius: 50%; border: 1px solid white;
            background: transparent; color: white; font-size: 1.5em; 
            display: flex; align-items: center; justify-content: center;
        }
        .pin-btn:active { background: rgba(255,255,255,0.2); }

        /* מבנה אפליקציה */
        #app-content { display: none; padding: 15px; padding-bottom: 220px; }

        .header { 
            background: white; padding: 20px; border-radius: 0 0 25px 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: -15px -15px 20px -15px;
            position: sticky; top: 0; z-index: 900;
        }
        
        .stats-row { display: flex; justify-content: space-around; margin-top: 15px; }
        .stat-item { text-align: center; }
        .stat-val { display: block; font-size: 1.5em; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 0.8em; color: #666; }

        /* כרטיסיות חיילים - גדולות ונוחות ללחיצה */
        .person-card { 
            background: white; margin-bottom: 10px; padding: 15px; 
            border-radius: 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-right: 8px solid #ddd;
        }
        .status-present { border-right-color: var(--success); }
        .status-missing { border-right-color: var(--danger); }

        /* תפריט תחתון "צף" - מותאם לאגודל */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: white; padding: 20px; border-radius: 30px 30px 0 0;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.15);
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            box-sizing: border-box;
        }
        .main-action { 
            grid-column: span 3; background: var(--primary); color: white; 
            padding: 18px; border-radius: 15px; font-weight: bold; font-size: 1.1em;
            text-align: center; border: none; margin-bottom: 5px;
        }
        .sub-action { 
            background: var(--gray); border: none; padding: 12px; 
            border-radius: 12px; font-size: 0.85em; font-weight: 600;
        }

        .team-label { font-weight: bold; margin: 20px 5px 10px 0; color: #444; font-size: 0.9em; }

        /* פופ-אפים */
        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: flex-end;
        }
        .drawer { 
            background: white; width: 100%; padding: 25px; border-radius: 25px 25px 0 0; 
            max-height: 80vh; overflow-y: auto; 
        }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="pin-display" id="pin-dots"></div>
    <div class="pin-grid">
        <button class="pin-btn" onclick="addDigit('1')">1</button>
        <button class="pin-btn" onclick="addDigit('2')">2</button>
        <button class="pin-btn" onclick="addDigit('3')">3</button>
        <button class="pin-btn" onclick="addDigit('4')">4</button>
        <button class="pin-btn" onclick="addDigit('5')">5</button>
        <button class="pin-btn" onclick="addDigit('6')">6</button>
        <button class="pin-btn" onclick="addDigit('7')">7</button>
        <button class="pin-btn" onclick="addDigit('8')">8</button>
        <button class="pin-btn" onclick="addDigit('9')">9</button>
        <button class="pin-btn" style="border:none"></button>
        <button class="pin-btn" onclick="addDigit('0')">0</button>
        <button class="pin-btn" style="border:none; font-size: 0.8em;" onclick="clearPin()">C</button>
    </div>
</div>

<div id="app-content">
    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0; font-size: 1.2em;">שליטה מחלקתית</h2>
            <button onclick="location.reload()" style="background:none; border:none; font-size: 1.5em;">🔒</button>
        </div>
        <div class="stats-row">
            <div class="stat-item"><span class="stat-val" id="p-count">0</span><span class="stat-label">נוכחים</span></div>
            <div class="stat-item"><span class="stat-val" style="color:var(--danger)" id="m-count">0</span><span class="stat-label">חסרים</span></div>
            <div class="stat-item"><span class="stat-val" style="color:#666" id="total-count">0</span><span class="stat-label">סה"כ</span></div>
        </div>
    </div>

    <input type="text" id="search" placeholder="🔍 חיפוש מהיר..." onkeyup="filter()" 
           style="width:100%; padding:15px; border-radius:12px; border:none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 16px;">

    <div id="list"></div>

    <div class="bottom-nav">
        <button class="main-action" onclick="openSender()">🚀 שלח דיווחים (WhatsApp)</button>
        <button class="sub-action" onclick="toggleDrawer('manage-drawer')">⚙️ הגדרות</button>
        <button class="sub-action" onclick="exportToExcel()">📊 אקסל</button>
        <button class="sub-action" onclick="resetAll()">🧹 איפוס</button>
    </div>
</div>

<div id="manage-drawer" class="overlay" onclick="closeDrawer(event)">
    <div class="drawer">
        <h3>הוספת חייל/ר"צ</h3>
        <input type="text" id="newName" placeholder="שם מלא" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; border:1px solid #ddd;">
        <input type="text" id="newTeam" placeholder="צוות" style="width:100%; margin-bottom:15px; padding:12px; border-radius:8px; border:1px solid #ddd;">
        <button onclick="addPerson()" style="width:100%; background:var(--primary); color:white; padding:15px; border:none; border-radius:12px;">הוסף לסד"כ</button>
        <hr style="margin:20px 0;">
        <p style="font-size:0.8em; color:#666;">* לניהול ר"צים וטלפונים, ערוך את רשימת הנמענים בקוד.</p>
    </div>
</div>

<script>
    const CORRECT_PIN = "1234"; // שנה כאן את הסיסמה שלך
    let currentPin = "";
    let data = JSON.parse(localStorage.getItem('sam_data_v1')) || [];

    // ניהול PIN
    function addDigit(d) {
        if(currentPin.length < 4) {
            currentPin += d;
            document.getElementById('pin-dots').innerText = "•".repeat(currentPin.length);
            if(currentPin === CORRECT_PIN) {
                setTimeout(unlock, 200);
            } else if(currentPin.length === 4) {
                alert("PIN שגוי");
                clearPin();
            }
        }
    }
    function clearPin() { currentPin = ""; document.getElementById('pin-dots').innerText = ""; }
    function unlock() {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        render();
    }

    // ניהול נתונים
    function save() {
        localStorage.setItem('sam_data_v1', JSON.stringify(data));
        render();
    }

    function render() {
        const container = document.getElementById('list');
        container.innerHTML = '';
        const teams = [...new Set(data.map(i => i.team))].sort();
        let p=0, m=0;

        teams.forEach(t => {
            container.innerHTML += `<div class="team-label">צוות ${t}</div>`;
            data.filter(i => i.team === t).forEach(item => {
                if(item.status === 'present') p++;
                if(item.status === 'missing') m++;
                
                const card = document.createElement('div');
                card.className = `person-card status-${item.status}`;
                card.innerHTML = `
                    <div style="font-weight:600;">${item.name}</div>
                    <div style="display:flex; gap:10px;">
                        <button onclick="setStatus(${item.id}, 'present')" style="padding:10px 18px; border-radius:10px; border:none; background:#e8f5e9; color:green; font-weight:bold;">V</button>
                        <button onclick="setStatus(${item.id}, 'missing')" style="padding:10px 18px; border-radius:10px; border:none; background:#ffebee; color:red; font-weight:bold;">X</button>
                    </div>
                `;
                container.appendChild(card);
            });
        });

        document.getElementById('p-count').innerText = p;
        document.getElementById('m-count').innerText = m;
        document.getElementById('total-count').innerText = data.length;
    }

    function setStatus(id, s) {
        const i = data.find(x => x.id === id);
        i.status = (i.status === s) ? 'none' : s;
        save();
        // פידבק רטט קל (עובד בחלק ממכשירי אנדרואיד)
        if(window.navigator.vibrate) window.navigator.vibrate(10);
    }

    function addPerson() {
        const n = document.getElementById('newName'), t = document.getElementById('newTeam');
        if(n.value && t.value) {
            data.push({id: Date.now(), name: n.value, team: t.value, status: 'none'});
            n.value = ''; t.value = '';
            save();
            document.getElementById('manage-drawer').style.display = 'none';
        }
    }

    function toggleDrawer(id) { document.getElementById(id).style.display = 'flex'; }
    function closeDrawer(e) { if(e.target.className === 'overlay') e.target.style.display = 'none'; }

    function filter() {
        const val = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.person-card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(val) ? 'flex' : 'none';
        });
    }

    function resetAll() { if(confirm("לאפס את כל הדיווחים?")) { data.forEach(i => i.status = 'none'); save(); } }

    function exportToExcel() {
        let csv = "\uFEFFשם,צוות,סטטוס\n";
        data.forEach(i => csv += `${i.name},${i.team},${i.status}\n`);
        const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "malkha_report.csv";
        link.click();
    }
</script>
</body>
</html>
